{% extends 'usuarios/base.html' %}
{% block title %}{{ titulo }} - Rocky Point Motoclub{% endblock %}

{% block content %}
<div class="form-container">
    <h1>{{ titulo }}</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Continuar</button>
    </form>
    <br>
    <a href="{% url 'lista_usuarios' %}" class="btn btn--secondary">Volver</a>
</div>
{% endblock %}
