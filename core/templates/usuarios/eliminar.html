{% extends 'usuarios/base.html' %}
{% block title %}Eliminar - Rocky Point Motoclub{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Eliminar miembro</h1>
    <p>¿Seguro que deseas eliminar a <strong>{{ usuario.nombre }} {{ usuario.apellido }}</strong>?</p>
    <br>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" style="background: var(--danger);">Sí, eliminar</button>
    </form>
    <br>
    <a href="{% url 'lista_usuarios' %}" class="btn btn--secondary">Cancelar</a>
</div>
{% endblock %}
